<!DOCTYPE html><html lang=uk><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Coffee Box</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel=stylesheet><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel=stylesheet><link rel=stylesheet href=coffee-box.131d13bd.css><body>
    <header class=header>
  <div class=box-logo>
    <a href=index.html class=logo-text>Національний</a>
  </div>

  
  <button type=button class=menu-btn aria-label="Открыть меню" data-open-burger>
    <div class=icon-burger-menu>
      <img src=icon-burger-menu.990e73cc.svg alt="burger menu" width=32 height=32>
    </div>
  </button>
</header>

    <section class="coffe-list section">
  <div class=slider-viewport>
    <div class=slider-track></div>
  </div>
  <div class=arrow-box>
    <button class="arrow arrow-back" type=button aria-label="Попередній слайд">
      <img src=arrow-back.df9b9494.svg alt="arrow back" width=34 height=34>
    </button>
    <button class="arrow arrow-next" type=button aria-label="Наступний слайд">
      <img src=arrow-next.f21a05d2.svg alt="arrow next" width=34 height=34>
    </button>
  </div>
</section>

    <footer class="coffee-footer footer">
  
  <div class=footer-container>
    <div class=calculation-box>
      <div class=syrup-box>
        <button class="btn-syrup syrup-minus">
          <img src=minus.447367e7.svg alt="minus icon" width=17 height=17>
        </button>
        <p class=surop-text>Сироп</p>
        <button class="btn-syrup syrup-plus">
          <img src=plus.31df08d9.svg alt=" plus icon" width=17 height=17>
        </button>
      </div>

      <button class=calculation>Онулити</button>
    </div>

    <div class=total-box><p class=example-amount>0.00</div>
  </div>
</footer>


    
    <div class=burger-menu id=burger-menu aria-hidden=true>
  <div class=burger-menu-backdrop data-close-burger></div>
  <div class=burger-menu-content>
    <div class=burger-menu-header>
      

      <button class=burger-menu-close aria-label="Закрыть меню" data-close-burger>
        <svg xmlns:xmlns=http://www.w3.org/2000/svg width=24 height=24 fill=none viewBox="0 0 24 24"><path fill=#292929 d="M19.194 6.417a1.14 1.14 0 1 0-1.611-1.611L12 10.389 6.417 4.806a1.14 1.14 0 1 0-1.611 1.611L10.389 12l-5.583 5.583a1.14 1.14 0 1 0 1.611 1.611L12 13.611l5.583 5.583a1.14 1.14 0 1 0 1.611-1.611L13.611 12Z"/></svg>
      </button>
    </div>

    <nav class=burger-menu-nav>
      <ul class=burger-menu-list>
        <li class=burger-menu-item>
          <a class=burger-menu-link href=# data-close-burger>Home</a>
        </li>
        <li class=burger-menu-item>
          <a class=burger-menu-link href=# data-close-burger>Recommended</a>
        </li>
        <li class=burger-menu-item>
          <a class=burger-menu-link href=# data-close-burger>Categories</a>
        </li>
        <li class=burger-menu-item>
          <a class=burger-menu-link href=# data-close-burger>How to buy</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
